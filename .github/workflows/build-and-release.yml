name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "fix/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  XMAKE_ROOT: y
  LLVM_MINGW_DIR: ${{ github.workspace }}\tools\llvm-mingw

jobs:
  build:
    name: Build Windows Artifacts
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Pull Git LFS assets
        shell: pwsh
        run: git lfs pull

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\tools
            ~\AppData\Local\.xmake
            ~\AppData\Local\xmake
          key: windows-xmake-${{ runner.os }}-${{ hashFiles('xmake.lua', '.gitmodules', 'local-repo/**') }}
          restore-keys: |
            windows-xmake-${{ runner.os }}-

      - name: Install llvm-mingw
        shell: pwsh
        run: |
          $targetDir = "${env:LLVM_MINGW_DIR}"
          if (Test-Path (Join-Path $targetDir "bin\clang++.exe")) {
            Write-Host "llvm-mingw already restored from cache."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          $apiUrl = "https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest"
          $release = Invoke-RestMethod -Uri $apiUrl -Headers @{ "X-GitHub-Api-Version" = "2022-11-28" }
          $asset = $release.assets | Where-Object { $_.name -match '^llvm-mingw-.*-ucrt-x86_64\.zip$' } | Select-Object -First 1

          if (-not $asset) {
            throw "Unable to find a llvm-mingw ucrt x86_64 zip asset in the latest release."
          }

          $zipPath = Join-Path $env:RUNNER_TEMP $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath (Split-Path $targetDir -Parent) -Force

          $expandedDir = Get-ChildItem (Split-Path $targetDir -Parent) -Directory |
            Where-Object { $_.Name -like 'llvm-mingw-*-ucrt-x86_64' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $expandedDir) {
            throw "llvm-mingw archive extracted, but the destination directory could not be located."
          }

          if (Test-Path $targetDir) {
            Remove-Item $targetDir -Recurse -Force
          }
          Move-Item $expandedDir.FullName $targetDir

      - name: Add llvm-mingw to PATH
        shell: pwsh
        run: |
          "$env:LLVM_MINGW_DIR\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show toolchain versions
        shell: pwsh
        run: |
          clang++ --version
          xmake --version

      - name: Configure xmake
        shell: pwsh
        run: |
          xmake f -y `
            -p mingw `
            -a x86_64 `
            -m release `
            --toolchain=clang `
            --sdk="${env:LLVM_MINGW_DIR}" `
            --mingw="${env:LLVM_MINGW_DIR}" `
            --runtimes="c++_static"

      - name: Build seetaface dependency
        shell: pwsh
        run: |
          xmake require --build -f -y -vD

      - name: Verify seetaface package
        shell: pwsh
        run: |
          xmake show -l packages

      - name: Build all targets
        shell: pwsh
        run: xmake build -v

      - name: Stage build artifacts
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\build"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "build\mingw\x86_64\release"
          if (-not (Test-Path $releaseDir)) {
            throw "Expected build output directory not found: $releaseDir"
          }

          Copy-Item -Path (Join-Path $releaseDir '*') -Destination $artifactDir -Recurse -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Smile2Unlock-build
          path: artifacts/build/**
          if-no-files-found: error

  release:
    name: Package And Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Smile2Unlock-build
          path: installer-files

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Collect release assets
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-assets"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Copy-Item -Path "Output\*" -Destination $releaseDir -Recurse -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
