name: Build and Release on Merge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  # 代码检查工作（在PR合并时运行）
  code-check:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Download Git LFS files
        run: git lfs pull
        shell: pwsh

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Run code analysis
        run: |
          xmake f -y -m debug -a x64 -p windows
          xmake build -v
          echo "代码编译检查通过"
        env:
          XMAKE_ROOT: y

  # 构建和发布工作（在代码推送到main分支时运行）
  build-and-release:
    # 如果是通过PR合并到main，需要等待code-check完成
    # 如果是直接push到main，则不需要等待
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Download Git LFS files
        run: git lfs pull
        shell: pwsh

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Build with xmake
        run: |
          xmake f -y -m release -a x64 -p windows
          xmake build -v
        env:
          XMAKE_ROOT: y

      - name: Prepare installer files
        run: |
          New-Item -Path "installer-files" -ItemType Directory -Force
          Copy-Item -Path "build\windows\x64\release\*" -Destination "installer-files\" -Exclude "*.lib","*.exp" -Recurse -Force
        shell: pwsh

      - name: List installer files
        run: |
          Write-Host "Files to be included in installer:"
          Get-ChildItem -Path "installer-files\" -Recurse
        shell: pwsh

      - name: Build installer with Inno Setup
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
        shell: pwsh

      - name: Collect release metadata
        id: release_meta
        run: |
          $commitMessage = git log -1 --pretty=format:"%s"
          $commitBody = git log -1 --pretty=format:"%b"
          $shortSha = git rev-parse --short HEAD
          $buildTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")
          $sourceArchive = "Smile2Unlock-source-$shortSha.zip"

          if ([string]::IsNullOrWhiteSpace($commitBody)) {
            $commitBody = "本次提交未提供额外说明。"
          }

          "commit_message<<EOF" >> $env:GITHUB_OUTPUT
          $commitMessage >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

          "commit_body<<EOF" >> $env:GITHUB_OUTPUT
          $commitBody >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "build_time=$buildTime" >> $env:GITHUB_OUTPUT
          "source_archive=$sourceArchive" >> $env:GITHUB_OUTPUT
          Write-Host "Commit message: $commitMessage"
          Write-Host "Source archive: $sourceArchive"
        shell: pwsh

      - name: Package source code and release assets
        run: |
          New-Item -Path "release-assets" -ItemType Directory -Force | Out-Null
          Copy-Item -Path "Output\*" -Destination "release-assets\" -Recurse -Force
          git archive --format=zip --output="release-assets\${{ steps.release_meta.outputs.source_archive }}" HEAD

          Write-Host "Release assets:"
          Get-ChildItem -Path "release-assets\" -Recurse
        shell: pwsh

      - name: Create or Update Release with fixed tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: action-release
          name: Smile2Unlock Latest Release
          body: |
            # Smile2Unlock 最新发布

            ## 发布内容
            - `Smile2Unlock-Setup.exe`：Windows 安装程序，包含本次构建所需的运行文件。
            - `${{ steps.release_meta.outputs.source_archive }}`：与本次发布对应的完整源码快照，可用于审查、归档或二次构建。

            ## 构建信息
            - 提交版本：`${{ github.sha }}`
            - 短提交号：`${{ steps.release_meta.outputs.short_sha }}`
            - 构建时间：`${{ steps.release_meta.outputs.build_time }}`
            - 工作流：`${{ github.workflow }}`

            ## 本次更新
            **提交摘要**
            ${{ steps.release_meta.outputs.commit_message }}

            **提交说明**
            ${{ steps.release_meta.outputs.commit_body }}

            ## 安装方式
            1. 下载 `Smile2Unlock-Setup.exe`。
            2. 以管理员权限运行安装程序。
            3. 按安装向导完成部署，安装程序会注册 Credential Provider。

            ## 注意事项
            - 安装和卸载都需要管理员权限。
            - 该发布面向 Windows x64 环境。
            - 如果你需要核对实现细节或自行构建，请下载源码压缩包。
          files: release-assets/*
          draft: false
          prerelease: false
          replace_assets: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
