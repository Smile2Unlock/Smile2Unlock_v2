name: Build and Release on Merge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  # 代码检查工作（在PR合并时运行）
  code-check:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Download Git LFS files
        run: git lfs pull
        shell: pwsh

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Run code analysis
        run: |
          xmake f -y -m debug -a x64 -p windows
          xmake build -v
          echo "代码编译检查通过"
        env:
          XMAKE_ROOT: y

  # 构建和发布工作（在代码推送到main分支时运行）
  build-and-release:
    # 如果是通过PR合并到main，需要等待code-check完成
    # 如果是直接push到main，则不需要等待
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Download Git LFS files
        run: git lfs pull
        shell: pwsh

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Build with xmake
        run: |
          xmake f -y -m release -a x64 -p windows
          xmake build -v
        env:
          XMAKE_ROOT: y

      - name: Prepare installer files
        run: |
          New-Item -Path "installer-files" -ItemType Directory -Force
          Copy-Item -Path "build\windows\x64\release\*" -Destination "installer-files\" -Exclude "*.lib","*.exp" -Recurse -Force
        shell: pwsh

      - name: List installer files
        run: |
          Write-Host "Files to be included in installer:"
          Get-ChildItem -Path "installer-files\" -Recurse
        shell: pwsh

      - name: Build installer with Inno Setup
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
        shell: pwsh

      - name: Get commit info for release notes
        id: get_commit_info
        run: |
          $commitMessage = git log -1 --pretty=format:"%s"
          $commitBody = git log -1 --pretty=format:"%b"
          echo "commit_message=$commitMessage" >> $env:GITHUB_OUTPUT
          echo "commit_body=$commitBody" >> $env:GITHUB_OUTPUT
          echo "Commit message: $commitMessage"
        shell: pwsh

      - name: Create or Update Release with fixed tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: action-release
          name: Smile2Unlock Latest Release
          body: |
            # Smile2Unlock Latest Release
            
            **Build Information:**
            - Commit: ${{ github.sha }}
            - Build Date: ${{ github.event.head_commit.timestamp }}
            
            **Latest Changes:**
            ${{ steps.get_commit_info.outputs.commit_message }}
            
            ${{ steps.get_commit_info.outputs.commit_body }}
            
            **Installation Instructions:**
            1. Download the installer below
            2. Run as administrator
            3. Follow the installation wizard
            
            **Note:** This software requires administrator privileges to install the credential provider.
            
            **Auto-generated release:** This release is automatically created when code is merged to the main branch.
          files: Output/*.exe
          draft: false
          prerelease: false
          replace_assets: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
